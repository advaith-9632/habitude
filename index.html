<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trajectory — Summer Goal Tracker</title>
<style>
  :root {
    --bg: #faf7f2;
    --bg-elev: #ffffff;
    --ink: #2b2521;
    --ink-soft: #6f665e;
    --border: #ece5db;
    --accent: #c97b5f;
    --accent-soft: #f3ded4;
    --accent-2: #7c9885;
    --accent-2-soft: #dde8e0;
    --grid-0: #ede7de;
    --danger: #c25b4f;
    --shadow: 0 1px 2px rgba(43,37,33,0.04), 0 8px 24px rgba(43,37,33,0.06);
    --radius: 18px;
  }

  [data-theme="dark"] {
    --bg: #1b1815;
    --bg-elev: #242019;
    --ink: #f1ece3;
    --ink-soft: #a89e91;
    --border: #35302a;
    --accent: #e0977a;
    --accent-soft: #3c2c25;
    --accent-2: #93b39d;
    --accent-2-soft: #263029;
    --grid-0: #2b2621;
    --danger: #e0857a;
    --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    transition: background 0.3s ease, color 0.3s ease;
    min-height: 100vh;
  }

  .app {
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 100px;
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-size: 32px;
    margin: 0 0 4px;
    letter-spacing: 0.3px;
    font-weight: 600;
  }

  .brand p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 14px;
    font-style: italic;
  }

  .theme-toggle {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-size: 18px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .theme-toggle:hover { transform: scale(1.06); }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    box-shadow: var(--shadow);
    width: fit-content;
    flex-wrap: wrap;
  }

  .tab-btn {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:not(.active):hover { color: var(--ink); }

  .view { display: none; }
  .view.active { display: block; }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Georgia', serif;
  }

  .stat-card .label {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 36px 0 16px;
  }
  .section-head h2 {
    font-size: 18px;
    margin: 0;
    font-weight: 600;
  }
  .section-head .sub {
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* --- progress bars / goal cards --- */
  .goal-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .goal-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
  }

  .goal-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 10px;
  }

  .goal-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .goal-sub {
    font-size: 13px;
    color: var(--ink-soft);
  }

  .progress-track {
    height: 10px;
    border-radius: 999px;
    background: var(--grid-0);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
  }

  /* --- gym card --- */
  .gym-card-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .gym-stats { display: flex; gap: 24px; }
  .gym-stat .num { font-size: 22px; font-weight: 700; color: #c95f8c; font-family: 'Georgia', serif; }
  .gym-stat .label { font-size: 12px; color: var(--ink-soft); }
  .gym-log-btn {
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    background: #c95f8c;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: filter 0.2s ease, opacity 0.2s ease;
    white-space: nowrap;
  }
  .gym-log-btn:hover { filter: brightness(1.08); }
  .gym-log-btn.done { background: var(--grid-0); color: var(--ink-soft); }
  .gym-history {
    display: flex;
    gap: 4px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .gym-history .cell {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    background: var(--grid-0);
  }
  .gym-history .cell.done { background: #c95f8c; }

  /* --- checklists --- */
  .checklist-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .checklist-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
  }

  .checklist-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
  }
  .checklist-head-left { display: flex; align-items: center; gap: 10px; }
  .checklist-head h3 { margin: 0; font-size: 17px; }
  .checklist-count { font-size: 13px; color: var(--ink-soft); }

  .checklist-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--grid-0);
  }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg-elev);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
  }
  .check-box.done { background: var(--accent-2); border-color: var(--accent-2); }

  .checklist-item-text {
    flex: 1;
    font-size: 14px;
    cursor: text;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .checklist-item-text:hover { background: rgba(0,0,0,0.04); }
  [data-theme="dark"] .checklist-item-text:hover { background: rgba(255,255,255,0.06); }
  .checklist-item-text.done { text-decoration: line-through; color: var(--ink-soft); }

  .checklist-item-edit {
    flex: 1;
    font-size: 14px;
    font-family: inherit;
    padding: 2px 4px;
    border-radius: 4px;
    border: 1px solid var(--accent);
    background: var(--bg-elev);
    color: var(--ink);
    outline: none;
  }

  .item-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 13px;
    opacity: 0.55;
    transition: opacity 0.2s ease, color 0.2s ease;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .icon-btn:hover { opacity: 1; }
  .icon-btn.danger:hover { color: var(--danger); }

  .checklist-add {
    display: flex;
    gap: 8px;
  }
  .checklist-add input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--ink);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .checklist-add input:focus { border-color: var(--accent); }

  .small-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.2s ease;
  }
  .small-btn:hover { filter: brightness(1.08); }

  /* --- notes --- */
  .notes-textarea {
    width: 100%;
    min-height: 90px;
    resize: vertical;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--grid-0);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.5;
  }
  .notes-textarea:focus { border-color: var(--accent); }
  .notes-saved-hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .notes-saved-hint.show { opacity: 1; }

  /* --- countdowns --- */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .countdown-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .countdown-card .cd-num {
    font-size: 32px;
    font-weight: 700;
    font-family: 'Georgia', serif;
  }
  .countdown-card .cd-label { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .countdown-card .cd-date { font-size: 11px; color: var(--ink-soft); margin-top: 8px; }

  footer {
    text-align: center;
    color: var(--ink-soft);
    font-size: 12px;
    margin-top: 60px;
    font-style: italic;
  }

  @media (max-width: 760px) {
    .summary { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <h1>Trajectory</h1>
      <p>your summer, on course</p>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-view="dashboard">Dashboard</button>
    <button class="tab-btn" data-view="goals">Goals</button>
    <button class="tab-btn" data-view="notes">Notes</button>
  </nav>

  <div class="view active" id="view-dashboard">
    <section class="summary">
      <div class="stat-card">
        <div class="num" id="statDaysLeft">–</div>
        <div class="label">days left until Sep 2</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statOverall">0%</div>
        <div class="label">overall academic progress</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statGymWeek">0/5</div>
        <div class="label">gym sessions this week</div>
      </div>
    </section>

    <div class="countdown-grid" id="countdownGrid"></div>

    <section class="goal-cards" id="dashGoalCards"></section>
  </div>

  <div class="view" id="view-goals">
    <div class="checklist-grid" id="checklistGrid"></div>
  </div>

  <div class="view" id="view-notes">
    <div class="checklist-grid" id="notesGrid"></div>
  </div>

  <footer>tracked locally, kept privately</footer>
</div>

<script>
(function () {
  // ---------- constants ----------
  const END = '2026-09-02';
  const ESAT_EXAM_START = '2026-10-12';

  const GOALS = [
    { id: 'esat', name: 'ESAT Prep', color: '#c97b5f' },
    { id: 'nea', name: 'A-Level DT NEA', color: '#5fa8a3' },
    { id: 'aero', name: 'Fundamentals of Aerodynamics', color: '#5f8cc9' },
    { id: 'blackholes', name: 'Black Holes & Time Warps', color: '#c9a15f' },
    { id: 'arduino', name: 'Arduino Project', color: '#7c9885' },
    { id: 'rocket', name: 'Rocket Propulsion (MIT OCW)', color: '#a15fc9' },
    { id: 'gym', name: 'Gym', color: '#c95f8c' }
  ];
  const CHECKLIST_GOALS = GOALS.filter(g => g.id !== 'gym');
  const goalById = id => GOALS.find(g => g.id === id);

  const DEFAULT_CHECKLISTS = {
    nea: [
      'Section A: Identify & investigate design opportunity',
      'Section A: Research existing products / market analysis',
      'Section A: User needs & wants analysis',
      'Section A: Write design brief',
      'Section A: Specification (design criteria)',
      'Section A: Final write-up & formatting',
      'Section B: Initial design ideas (start)'
    ],
    aero: ['Chapter 1', 'Chapter 2', 'Chapter 3', 'Chapter 4', 'Chapter 5'],
    blackholes: ['Chapter 1', 'Chapter 2', 'Chapter 3', 'Chapter 4'],
    arduino: [
      'Define project scope & order parts',
      'Set up dev environment / IDE',
      'Build circuit prototype',
      'Write & test core code',
      'Add sensor/feature logic',
      'Debug & refine',
      'Final assembly & documentation'
    ],
    rocket: [
      'Module 1: Intro & thermodynamics review',
      'Module 2: Nozzle & thrust theory',
      'Module 3: Propellant chemistry & combustion',
      'Module 4: Solid vs. liquid systems',
      'Module 5: Turbopumps & feed systems',
      'Module 6: Review & practice problems'
    ],
    esat: [
      'Diagnostic / practice test 1',
      'Section review: Maths 1',
      'Section review: Physics 1',
      'Section review: Maths 2',
      'Section review: Physics 2',
      'Timed practice test 2',
      'Timed practice test 3',
      'Final review & weak-point drills'
    ]
  };

  const CHECKLISTS_KEY = 'trajectory.checklists.v2';
  const NOTES_KEY = 'trajectory.notes.v1';
  const GYMLOG_KEY = 'trajectory.gymlog.v1';
  const THEME_KEY = 'trajectory.theme.v1';

  // ---------- date helpers ----------
  function toDate(s) { return new Date(s + 'T00:00:00'); }
  function dateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function addDays(d, n) { const nd = new Date(d); nd.setDate(nd.getDate() + n); return nd; }
  function todayDate() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
  function mondayOf(d) {
    const nd = new Date(d);
    const dow = nd.getDay();
    const diff = dow === 0 ? -6 : 1 - dow;
    return addDays(nd, diff);
  }
  function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

  // ---------- storage ----------
  let checklists = loadChecklists();
  let notes = loadNotes();
  let gymLog = loadGymLog();

  function loadChecklists() {
    try {
      const raw = localStorage.getItem(CHECKLISTS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // fill in any goals missing from an older save without wiping existing progress
        CHECKLIST_GOALS.forEach(g => {
          if (!parsed[g.id]) {
            parsed[g.id] = DEFAULT_CHECKLISTS[g.id].map((text, i) => ({ id: `${g.id}-${i}`, text, done: false }));
          }
        });
        return parsed;
      }
    } catch (e) {}
    const c = {};
    CHECKLIST_GOALS.forEach(g => {
      c[g.id] = DEFAULT_CHECKLISTS[g.id].map((text, i) => ({ id: `${g.id}-${i}`, text, done: false }));
    });
    localStorage.setItem(CHECKLISTS_KEY, JSON.stringify(c));
    return c;
  }
  function saveChecklists() { localStorage.setItem(CHECKLISTS_KEY, JSON.stringify(checklists)); }

  function loadNotes() {
    try {
      const raw = localStorage.getItem(NOTES_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return {};
  }
  function saveNotes() { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }

  function loadGymLog() {
    try {
      const raw = localStorage.getItem(GYMLOG_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return [];
  }
  function saveGymLog() { localStorage.setItem(GYMLOG_KEY, JSON.stringify(gymLog)); }

  // ---------- tab switching ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const views = document.querySelectorAll('.view');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      views.forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-' + btn.dataset.view).classList.add('active');
      renderAll();
    });
  });

  // ---------- theme ----------
  const themeToggle = document.getElementById('themeToggle');
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, theme);
  }
  const savedTheme = localStorage.getItem(THEME_KEY) ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);
  themeToggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });

  // ---------- checklist progress ----------
  function checklistProgress(goalId) {
    const items = checklists[goalId] || [];
    if (items.length === 0) return { pct: 0, done: 0, total: 0 };
    const done = items.filter(i => i.done).length;
    return { pct: Math.round((done / items.length) * 100), done, total: items.length };
  }

  // ---------- gym log ----------
  function isLoggedToday() {
    return gymLog.includes(dateStr(todayDate()));
  }
  function toggleGymToday() {
    const t = dateStr(todayDate());
    if (gymLog.includes(t)) gymLog = gymLog.filter(d => d !== t);
    else gymLog.push(t);
    saveGymLog();
    renderAll();
  }
  function gymCountThisWeek() {
    const today = todayDate();
    const weekStart = mondayOf(today);
    const weekEnd = addDays(weekStart, 6);
    return gymLog.filter(ds => {
      const d = toDate(ds);
      return d >= weekStart && d <= weekEnd;
    }).length;
  }

  // ---------- countdowns ----------
  function renderCountdowns() {
    const grid = document.getElementById('countdownGrid');
    const today = todayDate();
    const items = [
      { label: 'A-Level DT NEA — Section A due', date: END, color: '#5fa8a3' },
      { label: 'Summer break ends', date: END, color: '#c97b5f' },
      { label: 'ESAT exam window opens', date: ESAT_EXAM_START, color: '#c97b5f' }
    ];
    grid.innerHTML = '';
    items.forEach(item => {
      const d = toDate(item.date);
      const diff = daysBetween(today, d);
      const card = document.createElement('div');
      card.className = 'countdown-card';
      card.innerHTML = `
        <div class="cd-num" style="color:${item.color}">${diff >= 0 ? diff : 0}</div>
        <div class="cd-label">${item.label}</div>
        <div class="cd-date">${d.toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
      `;
      grid.appendChild(card);
    });
  }

  // ---------- dashboard ----------
  function buildGoalCard(goal, pct, subtitle) {
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.innerHTML = `
      <div class="goal-card-head">
        <div class="goal-title"><span class="dot" style="background:${goal.color}"></span>${goal.name}</div>
        <div class="progress-pct" style="color:${goal.color}">${pct}%</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${goal.color}"></div></div>
      <div class="goal-sub" style="margin-top:8px;">${subtitle}</div>
    `;
    return card;
  }

  function buildGymCard() {
    const card = document.createElement('div');
    card.className = 'goal-card';
    const week = gymCountThisWeek();
    const total = gymLog.length;
    const loggedToday = isLoggedToday();

    const head = document.createElement('div');
    head.className = 'goal-card-head';
    head.innerHTML = `<div class="goal-title"><span class="dot" style="background:#c95f8c"></span>Gym</div>`;
    card.appendChild(head);

    const body = document.createElement('div');
    body.className = 'gym-card-body';

    const stats = document.createElement('div');
    stats.className = 'gym-stats';
    stats.innerHTML = `
      <div class="gym-stat"><div class="num">${Math.min(week, 5)}/5</div><div class="label">this week</div></div>
      <div class="gym-stat"><div class="num">${total}</div><div class="label">total sessions</div></div>
    `;

    const btn = document.createElement('button');
    btn.className = 'gym-log-btn' + (loggedToday ? ' done' : '');
    btn.textContent = loggedToday ? '✓ Logged today' : 'Log today’s session';
    btn.addEventListener('click', toggleGymToday);

    body.appendChild(stats);
    body.appendChild(btn);
    card.appendChild(body);

    const hist = document.createElement('div');
    hist.className = 'gym-history';
    const today = todayDate();
    for (let i = 41; i >= 0; i--) {
      const d = addDays(today, -i);
      const cell = document.createElement('div');
      cell.className = 'cell' + (gymLog.includes(dateStr(d)) ? ' done' : '');
      cell.title = dateStr(d);
      hist.appendChild(cell);
    }
    card.appendChild(hist);

    return card;
  }

  function renderDashboard() {
    const today = todayDate();
    const endD = toDate(END);
    const daysLeft = Math.max(0, daysBetween(today, endD));
    document.getElementById('statDaysLeft').textContent = daysLeft;

    const progresses = CHECKLIST_GOALS.map(g => checklistProgress(g.id).pct);
    const overall = progresses.length ? Math.round(progresses.reduce((a, b) => a + b, 0) / progresses.length) : 0;
    document.getElementById('statOverall').textContent = overall + '%';

    document.getElementById('statGymWeek').textContent = `${Math.min(gymCountThisWeek(), 5)}/5`;

    renderCountdowns();

    const cardsEl = document.getElementById('dashGoalCards');
    cardsEl.innerHTML = '';
    CHECKLIST_GOALS.forEach(g => {
      const { pct, done, total } = checklistProgress(g.id);
      cardsEl.appendChild(buildGoalCard(g, pct, `${done}/${total} items complete`));
    });
    cardsEl.appendChild(buildGymCard());
  }

  // ---------- goals / checklists (editable) ----------
  function renderGoals() {
    const grid = document.getElementById('checklistGrid');
    grid.innerHTML = '';

    CHECKLIST_GOALS.forEach(g => {
      const items = checklists[g.id] || [];
      const doneCount = items.filter(i => i.done).length;

      const card = document.createElement('div');
      card.className = 'checklist-card';

      const head = document.createElement('div');
      head.className = 'checklist-head';
      head.innerHTML = `
        <div class="checklist-head-left"><span class="dot" style="background:${g.color}"></span><h3>${g.name}</h3></div>
        <div class="checklist-count">${doneCount}/${items.length}</div>
      `;
      card.appendChild(head);

      const itemsWrap = document.createElement('div');
      itemsWrap.className = 'checklist-items';

      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'checklist-item';

        const box = document.createElement('div');
        box.className = 'check-box' + (item.done ? ' done' : '');
        box.textContent = item.done ? '✓' : '';
        box.addEventListener('click', () => {
          item.done = !item.done;
          saveChecklists();
          renderAll();
        });

        const text = document.createElement('div');
        text.className = 'checklist-item-text' + (item.done ? ' done' : '');
        text.textContent = item.text;
        text.title = 'Click to edit';

        function startEdit() {
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'checklist-item-edit';
          input.value = item.text;
          input.maxLength = 120;
          row.replaceChild(input, text);
          input.focus();
          input.select();

          function commit() {
            const val = input.value.trim();
            if (val) item.text = val;
            saveChecklists();
            renderAll();
          }
          input.addEventListener('blur', commit);
          input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
            if (e.key === 'Escape') { e.preventDefault(); input.value = item.text; input.blur(); }
          });
        }
        text.addEventListener('click', startEdit);

        const actions = document.createElement('div');
        actions.className = 'item-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'icon-btn';
        editBtn.textContent = '✎';
        editBtn.title = 'Edit';
        editBtn.addEventListener('click', startEdit);

        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn danger';
        delBtn.textContent = '✕';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', () => {
          checklists[g.id] = checklists[g.id].filter(i => i.id !== item.id);
          saveChecklists();
          renderAll();
        });

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        row.appendChild(box);
        row.appendChild(text);
        row.appendChild(actions);
        itemsWrap.appendChild(row);
      });
      card.appendChild(itemsWrap);

      const addRow = document.createElement('div');
      addRow.className = 'checklist-add';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Add a sub-task…';
      input.maxLength = 120;
      const addBtn = document.createElement('button');
      addBtn.className = 'small-btn';
      addBtn.textContent = 'Add';
      function addItem() {
        const text = input.value.trim();
        if (!text) return;
        if (!checklists[g.id]) checklists[g.id] = [];
        checklists[g.id].push({ id: g.id + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), text, done: false });
        input.value = '';
        saveChecklists();
        renderAll();
      }
      addBtn.addEventListener('click', addItem);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
      addRow.appendChild(input);
      addRow.appendChild(addBtn);
      card.appendChild(addRow);

      grid.appendChild(card);
    });
  }

  // ---------- notes ----------
  function renderNotes() {
    const grid = document.getElementById('notesGrid');
    grid.innerHTML = '';

    CHECKLIST_GOALS.forEach(g => {
      const card = document.createElement('div');
      card.className = 'checklist-card';

      const head = document.createElement('div');
      head.className = 'checklist-head';
      head.innerHTML = `<div class="checklist-head-left"><span class="dot" style="background:${g.color}"></span><h3>${g.name}</h3></div>`;
      card.appendChild(head);

      const textarea = document.createElement('textarea');
      textarea.className = 'notes-textarea';
      textarea.placeholder = `Notes, research, ideas, blockers for ${g.name}…`;
      textarea.value = notes[g.id] || '';

      const hint = document.createElement('div');
      hint.className = 'notes-saved-hint';
      hint.textContent = 'Saved';

      let saveTimer = null;
      textarea.addEventListener('input', () => {
        notes[g.id] = textarea.value;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveNotes();
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1200);
        }, 400);
      });

      card.appendChild(textarea);
      card.appendChild(hint);
      grid.appendChild(card);
    });
  }

  // ---------- render all ----------
  function renderAll() {
    renderDashboard();
    renderGoals();
    renderNotes();
  }

  renderAll();
})();
</script>
</body>
</html>

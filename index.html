<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trajectory — Summer Goal Tracker</title>
<style>
  :root {
    --bg: #fff3ed;
    --bg-elev: #ffffff;
    --ink: #363636;
    --ink-soft: #736e6b;
    --border: #f0e1d5;
    --accent: #c57b57;
    --accent-soft: #f3ddd0;
    --accent-2: #4a654e;
    --accent-2-soft: #dfe6df;
    --grid-0: #f1e5da;
    --danger: #b5533f;
    --shadow: 0 1px 2px rgba(54,54,54,0.05), 0 8px 24px rgba(54,54,54,0.07);
    --radius: 18px;
  }

  [data-theme="dark"] {
    --bg: #232222;
    --bg-elev: #363636;
    --ink: #fff3ed;
    --ink-soft: #c4bab2;
    --border: #4a4644;
    --accent: #d6916f;
    --accent-soft: #4a352c;
    --accent-2: #83a087;
    --accent-2-soft: #2c3830;
    --grid-0: #403c3a;
    --danger: #d98a7c;
    --shadow: 0 1px 2px rgba(0,0,0,0.25), 0 8px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    transition: background 0.3s ease, color 0.3s ease;
    min-height: 100vh;
  }

  .app {
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 100px;
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-size: 32px;
    margin: 0 0 4px;
    letter-spacing: 0.3px;
    font-weight: 600;
  }

  .brand p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 14px;
    font-style: italic;
  }

  .theme-toggle {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-size: 18px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .theme-toggle:hover { transform: scale(1.06); }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    box-shadow: var(--shadow);
    width: fit-content;
    flex-wrap: wrap;
  }

  .tab-btn {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:not(.active):hover { color: var(--ink); }

  .view { display: none; }
  .view.active { display: block; }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Georgia', serif;
  }

  .stat-card .label {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 36px 0 16px;
  }
  .section-head h2 {
    font-size: 18px;
    margin: 0;
    font-weight: 600;
  }
  .section-head .sub {
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* --- hero ring --- */
  .hero-row {
    display: flex;
    gap: 20px;
    align-items: stretch;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .hero-ring-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex: 1;
    min-width: 280px;
  }
  .hero-ring-copy h2 {
    margin: 0 0 4px;
    font-size: 19px;
    font-weight: 600;
  }
  .hero-ring-copy p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
    max-width: 240px;
    line-height: 1.5;
  }

  /* --- bar chart --- */
  .chart-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 26px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .chart-bar-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .chart-bar-row:last-child { margin-bottom: 0; }
  .chart-bar-label {
    width: 190px;
    flex-shrink: 0;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chart-bar-track {
    flex: 1;
    height: 14px;
    border-radius: 999px;
    background: var(--grid-0);
    overflow: hidden;
  }
  .chart-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.5s ease;
  }
  .chart-bar-pct {
    width: 42px;
    flex-shrink: 0;
    text-align: right;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Georgia', serif;
  }

  /* --- ring grid (goal cards) --- */
  .ring-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .ring-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
  }
  .ring-card h4 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
  }
  .ring-card .goal-sub {
    font-size: 12px;
    color: var(--ink-soft);
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* --- gym card --- */
  .gym-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .gym-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .gym-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
  .gym-stats { display: flex; gap: 24px; }
  .gym-stat .num { font-size: 22px; font-weight: 700; font-family: 'Georgia', serif; }
  .gym-stat .label { font-size: 12px; color: var(--ink-soft); }
  .gym-log-btn {
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: filter 0.2s ease, opacity 0.2s ease;
    white-space: nowrap;
  }
  .gym-log-btn:hover { filter: brightness(1.08); }
  .gym-log-btn.done { background: var(--grid-0) !important; color: var(--ink-soft); }

  .heatmap {
    display: grid;
    grid-template-rows: repeat(7, 13px);
    grid-auto-flow: column;
    grid-auto-columns: 13px;
    gap: 3px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .heatmap .cell {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    background: var(--grid-0);
  }
  .heatmap .cell.clickable {
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .heatmap .cell.clickable:hover {
    transform: scale(1.35);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .heatmap-wrap { margin-top: 4px; }
  .heatmap-caption { font-size: 11px; color: var(--ink-soft); margin-top: 8px; }

  /* --- checklists --- */
  .checklist-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .checklist-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
  }

  .checklist-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
  }
  .checklist-head-left { display: flex; align-items: center; gap: 10px; }
  .checklist-head h3 { margin: 0; font-size: 17px; }
  .checklist-count { font-size: 13px; color: var(--ink-soft); }

  .checklist-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--grid-0);
    position: relative;
  }
  .checklist-item.drop-indicator-before { box-shadow: inset 0 2px 0 var(--accent); }
  .checklist-item.drop-indicator-after { box-shadow: inset 0 -2px 0 var(--accent); }

  .drag-handle {
    flex-shrink: 0;
    cursor: grab;
    color: var(--ink-soft);
    opacity: 0.45;
    font-size: 14px;
    padding: 2px 4px;
    touch-action: none;
    user-select: none;
    transition: opacity 0.2s ease;
  }
  .drag-handle:hover { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .checklist-item-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    opacity: 0.95;
  }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg-elev);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
  }
  .check-box.done { background: var(--accent-2); border-color: var(--accent-2); }

  .checklist-item-text {
    flex: 1;
    font-size: 14px;
    cursor: text;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .checklist-item-text:hover { background: rgba(0,0,0,0.04); }
  [data-theme="dark"] .checklist-item-text:hover { background: rgba(255,255,255,0.06); }
  .checklist-item-text.done { text-decoration: line-through; color: var(--ink-soft); }

  .checklist-item-edit {
    flex: 1;
    font-size: 14px;
    font-family: inherit;
    padding: 2px 4px;
    border-radius: 4px;
    border: 1px solid var(--accent);
    background: var(--bg-elev);
    color: var(--ink);
    outline: none;
  }

  .item-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 13px;
    opacity: 0.55;
    transition: opacity 0.2s ease, color 0.2s ease;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .icon-btn:hover { opacity: 1; }
  .icon-btn.danger:hover { color: var(--danger); }

  .checklist-add {
    display: flex;
    gap: 8px;
  }
  .checklist-add input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--ink);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .checklist-add input:focus { border-color: var(--accent); }

  .small-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.2s ease;
  }
  .small-btn:hover { filter: brightness(1.08); }

  /* --- notes --- */
  .notes-textarea {
    width: 100%;
    min-height: 90px;
    resize: vertical;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--grid-0);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    line-height: 1.5;
  }
  .notes-textarea:focus { border-color: var(--accent); }
  .notes-saved-hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .notes-saved-hint.show { opacity: 1; }

  /* --- countdowns --- */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .countdown-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .countdown-card .cd-num {
    font-size: 32px;
    font-weight: 700;
    font-family: 'Georgia', serif;
  }
  .countdown-card .cd-label { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .countdown-card .cd-date { font-size: 11px; color: var(--ink-soft); margin-top: 8px; }

  footer {
    text-align: center;
    color: var(--ink-soft);
    font-size: 12px;
    margin-top: 60px;
    font-style: italic;
  }

  @media (max-width: 760px) {
    .summary { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <h1>Trajectory</h1>
      <p>your summer, on course</p>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-view="dashboard">Dashboard</button>
    <button class="tab-btn" data-view="goals">Goals</button>
    <button class="tab-btn" data-view="notes">Notes</button>
  </nav>

  <div class="view active" id="view-dashboard">
    <section class="summary">
      <div class="stat-card">
        <div class="num" id="statDaysLeft">–</div>
        <div class="label">days left until Sep 2</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statOverall">0%</div>
        <div class="label">overall academic progress</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statGymWeek">0/5</div>
        <div class="label">gym sessions this week</div>
      </div>
    </section>

    <div class="hero-row" id="heroRow"></div>

    <div class="chart-card">
      <h2 style="margin:0 0 18px;font-size:16px;">Progress by goal</h2>
      <div id="barChart"></div>
    </div>

    <div class="ring-grid" id="ringGrid"></div>

    <div class="gym-card" id="gymCard"></div>

    <div class="countdown-grid" id="countdownGrid"></div>
  </div>

  <div class="view" id="view-goals">
    <div class="checklist-grid" id="checklistGrid"></div>
  </div>

  <div class="view" id="view-notes">
    <div class="checklist-grid" id="notesGrid"></div>
  </div>

  <footer>tracked locally, kept privately</footer>
</div>

<script>
(function () {
  // ---------- constants ----------
  const START = '2026-07-18';
  const END = '2026-09-02';
  const ESAT_EXAM_START = '2026-10-12';

  const GOALS = [
    { id: 'esat', name: 'ESAT Prep', color: '#c57b57' },
    { id: 'nea', name: 'A-Level DT NEA', color: '#4a654e' },
    { id: 'aero', name: 'Fundamentals of Aerodynamics', color: '#95b8d1' },
    { id: 'blackholes', name: 'Black Holes & Time Warps', color: '#6f95b0' },
    { id: 'arduino', name: 'Arduino Project', color: '#7c9a80' },
    { id: 'rocket', name: 'Rocket Propulsion (MIT OCW)', color: '#a85d3d' },
    { id: 'gym', name: 'Gym', color: '#b8a190' }
  ];
  const CHECKLIST_GOALS = GOALS.filter(g => g.id !== 'gym');
  const goalById = id => GOALS.find(g => g.id === id);

  const DEFAULT_CHECKLISTS = {
    nea: [
      'Section A: Identify & investigate design opportunity',
      'Section A: Research existing products / market analysis',
      'Section A: User needs & wants analysis',
      'Section A: Write design brief',
      'Section A: Specification (design criteria)',
      'Section A: Final write-up & formatting',
      'Section B: Initial design ideas (start)'
    ],
    aero: ['Chapter 1', 'Chapter 2', 'Chapter 3', 'Chapter 4', 'Chapter 5'],
    blackholes: ['Chapter 1', 'Chapter 2', 'Chapter 3', 'Chapter 4'],
    arduino: [
      'Define project scope & order parts',
      'Set up dev environment / IDE',
      'Build circuit prototype',
      'Write & test core code',
      'Add sensor/feature logic',
      'Debug & refine',
      'Final assembly & documentation'
    ],
    rocket: [
      'Module 1: Intro & thermodynamics review',
      'Module 2: Nozzle & thrust theory',
      'Module 3: Propellant chemistry & combustion',
      'Module 4: Solid vs. liquid systems',
      'Module 5: Turbopumps & feed systems',
      'Module 6: Review & practice problems'
    ],
    esat: [
      'Diagnostic / practice test 1',
      'Section review: Maths 1',
      'Section review: Physics 1',
      'Section review: Maths 2',
      'Section review: Physics 2',
      'Timed practice test 2',
      'Timed practice test 3',
      'Final review & weak-point drills'
    ]
  };

  const CHECKLISTS_KEY = 'trajectory.checklists.v2';
  const NOTES_KEY = 'trajectory.notes.v1';
  const GYMLOG_KEY = 'trajectory.gymlog.v1';
  const THEME_KEY = 'trajectory.theme.v1';

  // ---------- date helpers ----------
  function toDate(s) { return new Date(s + 'T00:00:00'); }
  function dateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function addDays(d, n) { const nd = new Date(d); nd.setDate(nd.getDate() + n); return nd; }
  function todayDate() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
  function mondayOf(d) {
    const nd = new Date(d);
    const dow = nd.getDay();
    const diff = dow === 0 ? -6 : 1 - dow;
    return addDays(nd, diff);
  }
  function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

  // ---------- storage ----------
  let checklists = loadChecklists();
  let notes = loadNotes();
  let gymLog = loadGymLog();

  function loadChecklists() {
    try {
      const raw = localStorage.getItem(CHECKLISTS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // fill in any goals missing from an older save without wiping existing progress
        CHECKLIST_GOALS.forEach(g => {
          if (!parsed[g.id]) {
            parsed[g.id] = DEFAULT_CHECKLISTS[g.id].map((text, i) => ({ id: `${g.id}-${i}`, text, done: false }));
          }
        });
        return parsed;
      }
    } catch (e) {}
    const c = {};
    CHECKLIST_GOALS.forEach(g => {
      c[g.id] = DEFAULT_CHECKLISTS[g.id].map((text, i) => ({ id: `${g.id}-${i}`, text, done: false }));
    });
    localStorage.setItem(CHECKLISTS_KEY, JSON.stringify(c));
    return c;
  }
  function saveChecklists() { localStorage.setItem(CHECKLISTS_KEY, JSON.stringify(checklists)); }

  function loadNotes() {
    try {
      const raw = localStorage.getItem(NOTES_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return {};
  }
  function saveNotes() { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }

  function loadGymLog() {
    try {
      const raw = localStorage.getItem(GYMLOG_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return [];
  }
  function saveGymLog() { localStorage.setItem(GYMLOG_KEY, JSON.stringify(gymLog)); }

  // ---------- tab switching ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const views = document.querySelectorAll('.view');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      views.forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-' + btn.dataset.view).classList.add('active');
      renderAll();
    });
  });

  // ---------- theme ----------
  const themeToggle = document.getElementById('themeToggle');
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, theme);
  }
  const savedTheme = localStorage.getItem(THEME_KEY) ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);
  themeToggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyTheme(cur === 'dark' ? 'light' : 'dark');
    renderAll();
  });

  // ---------- checklist progress ----------
  function checklistProgress(goalId) {
    const items = checklists[goalId] || [];
    if (items.length === 0) return { pct: 0, done: 0, total: 0 };
    const done = items.filter(i => i.done).length;
    return { pct: Math.round((done / items.length) * 100), done, total: items.length };
  }

  // ---------- gym log ----------
  function isLoggedToday() {
    return gymLog.includes(dateStr(todayDate()));
  }
  function toggleGymDate(ds) {
    if (gymLog.includes(ds)) gymLog = gymLog.filter(d => d !== ds);
    else gymLog.push(ds);
    saveGymLog();
    renderAll();
  }
  function toggleGymToday() {
    toggleGymDate(dateStr(todayDate()));
  }
  function gymCountThisWeek() {
    const today = todayDate();
    const weekStart = mondayOf(today);
    const weekEnd = addDays(weekStart, 6);
    return gymLog.filter(ds => {
      const d = toDate(ds);
      return d >= weekStart && d <= weekEnd;
    }).length;
  }

  // ---------- countdowns ----------
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function ringSVG(pct, color, size, stroke) {
    const p = Math.max(0, Math.min(100, pct));
    const r = (size - stroke) / 2;
    const c = 2 * Math.PI * r;
    const offset = c * (1 - p / 100);
    const cx = size / 2, cy = size / 2;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cssVar('--grid-0')}" stroke-width="${stroke}" />
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dashoffset 0.6s ease;" />
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="${Math.round(size * 0.22)}" font-weight="700" fill="${cssVar('--ink')}" font-family="Georgia, serif">${p}%</text>
    </svg>`;
  }

  function renderCountdowns() {
    const grid = document.getElementById('countdownGrid');
    const today = todayDate();
    const items = [
      { label: 'A-Level DT NEA — Section A due', date: END, color: '#4a654e' },
      { label: 'Summer break ends', date: END, color: '#c57b57' },
      { label: 'ESAT exam window opens', date: ESAT_EXAM_START, color: '#a85d3d' }
    ];
    grid.innerHTML = '';
    items.forEach(item => {
      const d = toDate(item.date);
      const diff = daysBetween(today, d);
      const card = document.createElement('div');
      card.className = 'countdown-card';
      card.innerHTML = `
        <div class="cd-num" style="color:${item.color}">${diff >= 0 ? diff : 0}</div>
        <div class="cd-label">${item.label}</div>
        <div class="cd-date">${d.toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
      `;
      grid.appendChild(card);
    });
  }

  // ---------- dashboard ----------
  function renderHeroRow(overallPct) {
    const el = document.getElementById('heroRow');
    const today = todayDate();
    const startD = toDate(START);
    const endD = toDate(END);
    const totalSpan = daysBetween(startD, endD);
    const elapsed = Math.max(0, Math.min(totalSpan, daysBetween(startD, today)));
    const elapsedPct = totalSpan > 0 ? Math.round((elapsed / totalSpan) * 100) : 0;

    el.innerHTML = '';

    const progressCard = document.createElement('div');
    progressCard.className = 'hero-ring-card';
    progressCard.innerHTML = `
      ${ringSVG(overallPct, cssVar('--accent'), 130, 12)}
      <div class="hero-ring-copy">
        <h2>Overall academic progress</h2>
        <p>Average completion across ESAT, NEA, Aerodynamics, Black Holes, Arduino and Rocket Propulsion.</p>
      </div>
    `;

    const timeCard = document.createElement('div');
    timeCard.className = 'hero-ring-card';
    timeCard.innerHTML = `
      ${ringSVG(elapsedPct, cssVar('--accent-2'), 130, 12)}
      <div class="hero-ring-copy">
        <h2>Summer elapsed</h2>
        <p>${elapsed} of ${totalSpan} days gone since Jul 18. Progress above should be keeping pace with this.</p>
      </div>
    `;

    el.appendChild(progressCard);
    el.appendChild(timeCard);
  }

  function renderBarChart() {
    const el = document.getElementById('barChart');
    el.innerHTML = '';
    CHECKLIST_GOALS.forEach(g => {
      const { pct } = checklistProgress(g.id);
      const row = document.createElement('div');
      row.className = 'chart-bar-row';
      row.innerHTML = `
        <div class="chart-bar-label"><span class="dot" style="background:${g.color}"></span>${g.name}</div>
        <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
        <div class="chart-bar-pct" style="color:${g.color}">${pct}%</div>
      `;
      el.appendChild(row);
    });
  }

  function renderRingGrid() {
    const el = document.getElementById('ringGrid');
    el.innerHTML = '';
    CHECKLIST_GOALS.forEach(g => {
      const { pct, done, total } = checklistProgress(g.id);
      const card = document.createElement('div');
      card.className = 'ring-card';
      card.innerHTML = `
        ${ringSVG(pct, g.color, 96, 9)}
        <h4>${g.name}</h4>
        <div class="goal-sub">${done}/${total} items</div>
      `;
      el.appendChild(card);
    });
  }

  function renderGymCard() {
    const gymGoal = goalById('gym');
    const el = document.getElementById('gymCard');
    const week = gymCountThisWeek();
    const total = gymLog.length;
    const loggedToday = isLoggedToday();

    el.innerHTML = '';

    const top = document.createElement('div');
    top.className = 'gym-card-top';
    top.innerHTML = `
      <div class="gym-title"><span class="dot" style="background:${gymGoal.color}"></span>Gym</div>
      <div class="gym-stats">
        <div class="gym-stat"><div class="num" style="color:${gymGoal.color}">${Math.min(week, 5)}/5</div><div class="label">this week</div></div>
        <div class="gym-stat"><div class="num" style="color:${gymGoal.color}">${total}</div><div class="label">total sessions</div></div>
      </div>
    `;
    const btn = document.createElement('button');
    btn.className = 'gym-log-btn' + (loggedToday ? ' done' : '');
    btn.style.background = loggedToday ? '' : gymGoal.color;
    btn.textContent = loggedToday ? '✓ Logged today' : 'Log today’s session';
    btn.addEventListener('click', toggleGymToday);
    top.appendChild(btn);
    el.appendChild(top);

    const wrap = document.createElement('div');
    wrap.className = 'heatmap-wrap';
    const hist = document.createElement('div');
    hist.className = 'heatmap';
    const today = todayDate();
    for (let i = 83; i >= 0; i--) {
      const d = addDays(today, -i);
      const ds = dateStr(d);
      const logged = gymLog.includes(ds);
      const cell = document.createElement('div');
      cell.className = 'cell clickable';
      if (logged) cell.style.background = gymGoal.color;
      cell.title = `${ds}${logged ? ' — logged. Click to unlog.' : ' — click to log a session'}`;
      cell.addEventListener('click', () => toggleGymDate(ds));
      hist.appendChild(cell);
    }
    wrap.appendChild(hist);
    const caption = document.createElement('div');
    caption.className = 'heatmap-caption';
    caption.textContent = 'Last 12 weeks';
    wrap.appendChild(caption);
    el.appendChild(wrap);
  }

  function renderDashboard() {
    const today = todayDate();
    const endD = toDate(END);
    const daysLeft = Math.max(0, daysBetween(today, endD));
    document.getElementById('statDaysLeft').textContent = daysLeft;

    const progresses = CHECKLIST_GOALS.map(g => checklistProgress(g.id).pct);
    const overall = progresses.length ? Math.round(progresses.reduce((a, b) => a + b, 0) / progresses.length) : 0;
    document.getElementById('statOverall').textContent = overall + '%';

    document.getElementById('statGymWeek').textContent = `${Math.min(gymCountThisWeek(), 5)}/5`;

    renderHeroRow(overall);
    renderBarChart();
    renderRingGrid();
    renderGymCard();
    renderCountdowns();
  }

  // ---------- goals / checklists (editable) ----------
  function beginReorderDrag(downEvent, row, goalId, item, container) {
    const startY = downEvent.clientY;
    const startX = downEvent.clientX;
    let dragging = false;
    let ghost = null;

    function clearIndicators() {
      container.querySelectorAll('.checklist-item').forEach(r => {
        r.classList.remove('drop-indicator-before', 'drop-indicator-after');
      });
    }

    function findTarget(x, y) {
      const el = document.elementFromPoint(x, y);
      if (!el) return null;
      const target = el.closest('.checklist-item');
      if (!target || target === row || target.dataset.goalId !== goalId) return null;
      return target;
    }

    function onMove(e) {
      if (!dragging) {
        if (Math.abs(e.clientX - startX) < 4 && Math.abs(e.clientY - startY) < 4) return;
        dragging = true;
        ghost = row.cloneNode(true);
        ghost.classList.add('checklist-item-ghost');
        ghost.style.width = row.offsetWidth + 'px';
        document.body.appendChild(ghost);
        row.style.opacity = '0.35';
      }
      ghost.style.left = (e.clientX - 20) + 'px';
      ghost.style.top = (e.clientY - row.offsetHeight / 2) + 'px';

      clearIndicators();
      const target = findTarget(e.clientX, e.clientY);
      if (target) {
        const rect = target.getBoundingClientRect();
        const before = e.clientY < rect.top + rect.height / 2;
        target.classList.add(before ? 'drop-indicator-before' : 'drop-indicator-after');
      }
    }

    function onUp(e) {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      clearIndicators();
      if (!dragging) return;
      if (ghost) ghost.remove();
      row.style.opacity = '';

      const target = findTarget(e.clientX, e.clientY);
      if (target) {
        const rect = target.getBoundingClientRect();
        const before = e.clientY < rect.top + rect.height / 2;
        const arr = checklists[goalId];
        const fromIdx = arr.findIndex(i => i.id === item.id);
        if (fromIdx !== -1) {
          arr.splice(fromIdx, 1);
          let toIdx = arr.findIndex(i => i.id === target.dataset.itemId);
          if (toIdx === -1) toIdx = arr.length;
          if (!before) toIdx++;
          arr.splice(toIdx, 0, item);
          saveChecklists();
        }
      }
      renderAll();
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  function renderGoals() {
    const grid = document.getElementById('checklistGrid');
    grid.innerHTML = '';

    CHECKLIST_GOALS.forEach(g => {
      const items = checklists[g.id] || [];
      const doneCount = items.filter(i => i.done).length;

      const card = document.createElement('div');
      card.className = 'checklist-card';

      const head = document.createElement('div');
      head.className = 'checklist-head';
      head.innerHTML = `
        <div class="checklist-head-left"><span class="dot" style="background:${g.color}"></span><h3>${g.name}</h3></div>
        <div class="checklist-count">${doneCount}/${items.length}</div>
      `;
      card.appendChild(head);

      const itemsWrap = document.createElement('div');
      itemsWrap.className = 'checklist-items';

      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'checklist-item';
        row.dataset.goalId = g.id;
        row.dataset.itemId = item.id;

        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.title = 'Drag to reorder';
        handle.addEventListener('pointerdown', e => {
          e.preventDefault();
          beginReorderDrag(e, row, g.id, item, itemsWrap);
        });

        const box = document.createElement('div');
        box.className = 'check-box' + (item.done ? ' done' : '');
        box.textContent = item.done ? '✓' : '';
        box.addEventListener('click', () => {
          item.done = !item.done;
          saveChecklists();
          renderAll();
        });

        const text = document.createElement('div');
        text.className = 'checklist-item-text' + (item.done ? ' done' : '');
        text.textContent = item.text;
        text.title = 'Click to edit';

        function startEdit() {
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'checklist-item-edit';
          input.value = item.text;
          input.maxLength = 120;
          row.replaceChild(input, text);
          input.focus();
          input.select();

          function commit() {
            const val = input.value.trim();
            if (val) item.text = val;
            saveChecklists();
            renderAll();
          }
          input.addEventListener('blur', commit);
          input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
            if (e.key === 'Escape') { e.preventDefault(); input.value = item.text; input.blur(); }
          });
        }
        text.addEventListener('click', startEdit);

        const actions = document.createElement('div');
        actions.className = 'item-actions';

        const editBtn = document.createElement('button');
        editBtn.className = 'icon-btn';
        editBtn.textContent = '✎';
        editBtn.title = 'Edit';
        editBtn.addEventListener('click', startEdit);

        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn danger';
        delBtn.textContent = '✕';
        delBtn.title = 'Delete';
        delBtn.addEventListener('click', () => {
          checklists[g.id] = checklists[g.id].filter(i => i.id !== item.id);
          saveChecklists();
          renderAll();
        });

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        row.appendChild(handle);
        row.appendChild(box);
        row.appendChild(text);
        row.appendChild(actions);
        itemsWrap.appendChild(row);
      });
      card.appendChild(itemsWrap);

      const addRow = document.createElement('div');
      addRow.className = 'checklist-add';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Add a sub-task…';
      input.maxLength = 120;
      const addBtn = document.createElement('button');
      addBtn.className = 'small-btn';
      addBtn.textContent = 'Add';
      function addItem() {
        const text = input.value.trim();
        if (!text) return;
        if (!checklists[g.id]) checklists[g.id] = [];
        checklists[g.id].push({ id: g.id + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), text, done: false });
        input.value = '';
        saveChecklists();
        renderAll();
      }
      addBtn.addEventListener('click', addItem);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
      addRow.appendChild(input);
      addRow.appendChild(addBtn);
      card.appendChild(addRow);

      grid.appendChild(card);
    });
  }

  // ---------- notes ----------
  function renderNotes() {
    const grid = document.getElementById('notesGrid');
    grid.innerHTML = '';

    CHECKLIST_GOALS.forEach(g => {
      const card = document.createElement('div');
      card.className = 'checklist-card';

      const head = document.createElement('div');
      head.className = 'checklist-head';
      head.innerHTML = `<div class="checklist-head-left"><span class="dot" style="background:${g.color}"></span><h3>${g.name}</h3></div>`;
      card.appendChild(head);

      const textarea = document.createElement('textarea');
      textarea.className = 'notes-textarea';
      textarea.placeholder = `Notes, research, ideas, blockers for ${g.name}…`;
      textarea.value = notes[g.id] || '';

      const hint = document.createElement('div');
      hint.className = 'notes-saved-hint';
      hint.textContent = 'Saved';

      let saveTimer = null;
      textarea.addEventListener('input', () => {
        notes[g.id] = textarea.value;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveNotes();
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1200);
        }, 400);
      });

      card.appendChild(textarea);
      card.appendChild(hint);
      grid.appendChild(card);
    });
  }

  // ---------- render all ----------
  function renderAll() {
    renderDashboard();
    renderGoals();
    renderNotes();
  }

  renderAll();
})();
</script>
</body>
</html>

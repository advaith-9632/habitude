<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trajectory — Summer Goal Tracker</title>
<style>
  :root {
    --bg: #faf7f2;
    --bg-elev: #ffffff;
    --ink: #2b2521;
    --ink-soft: #6f665e;
    --border: #ece5db;
    --accent: #c97b5f;
    --accent-soft: #f3ded4;
    --accent-2: #7c9885;
    --accent-2-soft: #dde8e0;
    --grid-0: #ede7de;
    --danger: #c25b4f;
    --shadow: 0 1px 2px rgba(43,37,33,0.04), 0 8px 24px rgba(43,37,33,0.06);
    --radius: 18px;
  }

  [data-theme="dark"] {
    --bg: #1b1815;
    --bg-elev: #242019;
    --ink: #f1ece3;
    --ink-soft: #a89e91;
    --border: #35302a;
    --accent: #e0977a;
    --accent-soft: #3c2c25;
    --accent-2: #93b39d;
    --accent-2-soft: #263029;
    --grid-0: #2b2621;
    --danger: #e0857a;
    --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    transition: background 0.3s ease, color 0.3s ease;
    min-height: 100vh;
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 100px;
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-size: 32px;
    margin: 0 0 4px;
    letter-spacing: 0.3px;
    font-weight: 600;
  }

  .brand p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 14px;
    font-style: italic;
  }

  .theme-toggle {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-size: 18px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .theme-toggle:hover { transform: scale(1.06); }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px;
    box-shadow: var(--shadow);
    width: fit-content;
  }

  .tab-btn {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:not(.active):hover { color: var(--ink); }

  .view { display: none; }
  .view.active { display: block; }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Georgia', serif;
  }

  .stat-card .label {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  /* --- progress bars / goal cards --- */
  .goal-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .goal-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
  }

  .goal-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .goal-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .goal-sub {
    font-size: 13px;
    color: var(--ink-soft);
  }

  .progress-track {
    height: 10px;
    border-radius: 999px;
    background: var(--grid-0);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-weight: 700;
    font-size: 15px;
  }

  /* --- calendar --- */
  .cal-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .cal-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .cal-legend span { display: flex; align-items: center; gap: 6px; }

  .unscheduled-tray {
    background: var(--accent-soft);
    border: 1px dashed var(--accent);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    display: none;
  }
  .unscheduled-tray.has-items { display: block; }
  .unscheduled-tray h4 {
    margin: 0 0 10px;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .unscheduled-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 30px;
  }

  .cal-week-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
  }

  .cal-week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }

  .cal-day {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    min-height: 118px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .cal-day.outside { opacity: 0.3; }
  .cal-day.today { border-color: var(--accent); border-width: 2px; }
  .cal-day.away { background: var(--grid-0); }
  .cal-day.drag-over { background: var(--accent-2-soft); border-color: var(--accent-2); }
  .unscheduled-list.drag-over { background: var(--accent-2-soft); outline: 2px solid var(--accent-2); border-radius: 10px; }

  .cal-chip-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    opacity: 0.95;
    transform: rotate(-2deg);
  }

  .cal-day-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cal-day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .cal-day.today .cal-day-num { color: var(--accent); }

  .cal-day-actions {
    display: flex;
    gap: 4px;
  }

  .cal-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 6px;
    opacity: 0.6;
    transition: opacity 0.15s ease, color 0.15s ease;
  }
  .cal-icon-btn:hover { opacity: 1; }
  .cal-day.away .cal-icon-btn.away-btn { opacity: 1; color: var(--danger); }

  .cal-chips {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .cal-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--chip-color, var(--accent));
    color: #fff;
    border-radius: 8px;
    padding: 4px 6px;
    font-size: 11px;
    line-height: 1.25;
    cursor: grab;
    position: relative;
  }
  .cal-chip.completed { opacity: 0.5; text-decoration: line-through; }
  .cal-chip:active { cursor: grabbing; }

  .cal-chip-check {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }

  .cal-chip-text {
    flex: 1;
    word-break: break-word;
  }

  .cal-chip-del {
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    font-size: 11px;
    padding: 0;
    flex-shrink: 0;
  }

  /* --- checklists --- */
  .checklist-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .checklist-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
  }

  .checklist-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .checklist-head h3 { margin: 0; font-size: 17px; }

  .checklist-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--grid-0);
  }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg-elev);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
  }
  .check-box.done { background: var(--accent-2); border-color: var(--accent-2); }

  .checklist-item-text { flex: 1; font-size: 14px; }
  .checklist-item-text.done { text-decoration: line-through; color: var(--ink-soft); }

  .checklist-add {
    display: flex;
    gap: 8px;
  }
  .checklist-add input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--ink);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .checklist-add input:focus { border-color: var(--accent); }

  .small-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.2s ease;
  }
  .small-btn:hover { filter: brightness(1.08); }

  .del-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 15px;
    opacity: 0.5;
    transition: opacity 0.2s ease, color 0.2s ease;
    padding: 2px 6px;
  }
  .del-btn:hover { opacity: 1; color: var(--danger); }

  /* --- modal --- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 16, 14, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-elev);
    border-radius: var(--radius);
    padding: 26px;
    width: 100%;
    max-width: 360px;
    box-shadow: var(--shadow);
  }
  .modal h3 { margin: 0 0 16px; font-size: 17px; }
  .modal label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  .modal select, .modal input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-cancel {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 10px 14px;
  }

  footer {
    text-align: center;
    color: var(--ink-soft);
    font-size: 12px;
    margin-top: 60px;
    font-style: italic;
  }

  @media (max-width: 760px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .cal-week, .cal-week-labels { grid-template-columns: repeat(7, minmax(80px, 1fr)); }
    .cal-week-wrap { overflow-x: auto; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <h1>Trajectory</h1>
      <p>your summer, on course</p>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-view="dashboard">Dashboard</button>
    <button class="tab-btn" data-view="calendar">Calendar</button>
    <button class="tab-btn" data-view="goals">Goals</button>
  </nav>

  <div class="view active" id="view-dashboard">
    <section class="summary">
      <div class="stat-card">
        <div class="num" id="statDaysLeft">–</div>
        <div class="label">days left until Sep 2</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statOverall">0%</div>
        <div class="label">overall academic progress</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statGymWeek">0/5</div>
        <div class="label">gym sessions this week</div>
      </div>
    </section>

    <section class="goal-cards" id="dashGoalCards"></section>
  </div>

  <div class="view" id="view-calendar">
    <div class="cal-toolbar">
      <div class="cal-legend" id="calLegend"></div>
      <button class="small-btn" id="regenBtn">Reset to suggested schedule</button>
    </div>

    <div class="unscheduled-tray" id="unscheduledTray">
      <h4>Unscheduled (drag onto a day)</h4>
      <div class="unscheduled-list" id="unscheduledList"></div>
    </div>

    <div class="cal-week-wrap">
      <div class="cal-week-labels">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div id="calWeeks"></div>
    </div>
  </div>

  <div class="view" id="view-goals">
    <div class="checklist-grid" id="checklistGrid"></div>
  </div>

  <footer>tracked locally, kept privately</footer>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add a task</h3>
    <label for="addModalGoal">Goal</label>
    <select id="addModalGoal"></select>
    <label for="addModalTitle">Description</label>
    <input type="text" id="addModalTitle" placeholder="e.g. Extra practice problems" maxlength="80">
    <div class="modal-actions">
      <button class="modal-cancel" id="addModalCancel">Cancel</button>
      <button class="small-btn" id="addModalConfirm">Add</button>
    </div>
  </div>
</div>

<script>
(function () {
  // ---------- constants ----------
  const START = '2026-07-18';
  const END = '2026-09-02';

  const GOALS = [
    { id: 'esat', name: 'ESAT Prep', color: '#c97b5f' },
    { id: 'aero', name: 'Fundamentals of Aerodynamics', color: '#5f8cc9' },
    { id: 'blackholes', name: 'Black Holes & Time Warps', color: '#c9a15f' },
    { id: 'arduino', name: 'Arduino Project', color: '#7c9885' },
    { id: 'rocket', name: 'Rocket Propulsion (MIT OCW)', color: '#a15fc9' },
    { id: 'gym', name: 'Gym', color: '#c95f8c' }
  ];
  const CHECKLIST_GOALS = GOALS.filter(g => g.id !== 'gym');
  const goalById = id => GOALS.find(g => g.id === id);

  const DEFAULT_CHECKLISTS = {
    aero: ['Chapter 1', 'Chapter 2', 'Chapter 3', 'Chapter 4', 'Chapter 5'],
    blackholes: ['Chapter 1', 'Chapter 2', 'Chapter 3', 'Chapter 4'],
    arduino: [
      'Define project scope & order parts',
      'Set up dev environment / IDE',
      'Build circuit prototype',
      'Write & test core code',
      'Add sensor/feature logic',
      'Debug & refine',
      'Final assembly & documentation'
    ],
    rocket: [
      'Module 1: Intro & thermodynamics review',
      'Module 2: Nozzle & thrust theory',
      'Module 3: Propellant chemistry & combustion',
      'Module 4: Solid vs. liquid systems',
      'Module 5: Turbopumps & feed systems',
      'Module 6: Review & practice problems'
    ],
    esat: [
      'Diagnostic / practice test 1',
      'Section review: Maths 1',
      'Section review: Physics 1',
      'Section review: Maths 2',
      'Section review: Physics 2',
      'Timed practice test 2',
      'Timed practice test 3',
      'Final review & weak-point drills'
    ]
  };

  const EVENTS_KEY = 'trajectory.events.v1';
  const AWAY_KEY = 'trajectory.away.v1';
  const CHECKLISTS_KEY = 'trajectory.checklists.v1';
  const THEME_KEY = 'trajectory.theme.v1';

  // ---------- date helpers ----------
  function toDate(s) { return new Date(s + 'T00:00:00'); }
  function dateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }
  function addDays(d, n) { const nd = new Date(d); nd.setDate(nd.getDate() + n); return nd; }
  function todayDate() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
  function mondayOf(d) {
    const nd = new Date(d);
    const dow = nd.getDay(); // 0 Sun..6 Sat
    const diff = dow === 0 ? -6 : 1 - dow;
    return addDays(nd, diff);
  }

  // ---------- seed schedule generation ----------
  function phaseFor(d) {
    const t = d.getTime();
    if (t <= toDate('2026-07-31').getTime()) return 'aero';
    if (t <= toDate('2026-08-08').getTime()) return 'arduino';
    if (t <= toDate('2026-08-29').getTime()) return 'rocket';
    return 'final';
  }
  function phaseGoalId(phase) {
    return { aero: 'aero', arduino: 'arduino', rocket: 'rocket', final: 'esat' }[phase];
  }

  function generateSeedEvents() {
    const events = [];
    let id = 1;
    const start = toDate(START), end = toDate(END);
    const aeroQueue = [1, 2, 3, 4, 5].map(n => `Aerodynamics: Chapter ${n}`);
    const bhQueue = [1, 2, 3, 4].map(n => `Black Holes: Chapter ${n}`);
    const rocketQueue = [
      'Rocket Propulsion: Module 1 — Intro & thermodynamics',
      'Rocket Propulsion: Module 2 — Nozzle & thrust theory',
      'Rocket Propulsion: Module 3 — Propellant chemistry',
      'Rocket Propulsion: Module 4 — Solid vs liquid systems',
      'Rocket Propulsion: Module 5 — Turbopumps & feed systems',
      'Rocket Propulsion: Module 6 — Review & problems'
    ];
    let aeroCount = 0, bhCount = 0;

    for (let d = new Date(start); d <= end; d = addDays(d, 1)) {
      const ds = dateStr(d);
      const dow = d.getDay();
      if (dow === 0) continue; // Sunday: full rest

      const phase = phaseFor(d);

      if (dow >= 1 && dow <= 5) {
        events.push({ id: id++, date: ds, goalId: 'gym', title: 'Gym session (50 min)', completed: false });
      }

      if (dow === 6) {
        events.push({ id: id++, date: ds, goalId: 'esat', title: 'ESAT: timed practice / review', completed: false });
        events.push({ id: id++, date: ds, goalId: phaseGoalId(phase), title: 'Catch-up & review', completed: false });
        continue;
      }

      events.push({ id: id++, date: ds, goalId: 'esat', title: 'ESAT prep (45 min)', completed: false });

      let primaryGoal, primaryTitle;
      if (phase === 'aero') {
        if (aeroQueue.length && aeroCount <= bhCount) {
          primaryGoal = 'aero'; primaryTitle = aeroQueue.shift(); aeroCount++;
        } else if (bhQueue.length) {
          primaryGoal = 'blackholes'; primaryTitle = bhQueue.shift(); bhCount++;
        } else if (aeroQueue.length) {
          primaryGoal = 'aero'; primaryTitle = aeroQueue.shift(); aeroCount++;
        } else {
          primaryGoal = 'aero'; primaryTitle = 'Aerodynamics: review & problem sets';
        }
      } else if (phase === 'arduino') {
        primaryGoal = 'arduino'; primaryTitle = 'Arduino: build session';
      } else if (phase === 'rocket') {
        if (rocketQueue.length) { primaryGoal = 'rocket'; primaryTitle = rocketQueue.shift(); }
        else { primaryGoal = 'rocket'; primaryTitle = 'Rocket Propulsion: review'; }
      } else {
        primaryGoal = 'esat'; primaryTitle = 'ESAT: intensive review block';
      }
      events.push({ id: id++, date: ds, goalId: primaryGoal, title: primaryTitle, completed: false });
    }
    return events;
  }

  // ---------- storage ----------
  let events = loadEvents();
  let awayDays = loadAway();
  let checklists = loadChecklists();
  let nextId = events.reduce((m, e) => Math.max(m, e.id), 0) + 1;

  function loadEvents() {
    try {
      const raw = localStorage.getItem(EVENTS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    const seeded = generateSeedEvents();
    localStorage.setItem(EVENTS_KEY, JSON.stringify(seeded));
    return seeded;
  }
  function saveEvents() { localStorage.setItem(EVENTS_KEY, JSON.stringify(events)); }

  function loadAway() {
    try {
      const raw = localStorage.getItem(AWAY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }
  function saveAway() { localStorage.setItem(AWAY_KEY, JSON.stringify(awayDays)); }

  function loadChecklists() {
    try {
      const raw = localStorage.getItem(CHECKLISTS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    const c = {};
    CHECKLIST_GOALS.forEach(g => {
      c[g.id] = DEFAULT_CHECKLISTS[g.id].map((text, i) => ({ id: `${g.id}-${i}`, text, done: false }));
    });
    localStorage.setItem(CHECKLISTS_KEY, JSON.stringify(c));
    return c;
  }
  function saveChecklists() { localStorage.setItem(CHECKLISTS_KEY, JSON.stringify(checklists)); }

  // ---------- tab switching ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const views = document.querySelectorAll('.view');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      views.forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-' + btn.dataset.view).classList.add('active');
      renderAll();
    });
  });

  // ---------- theme ----------
  const themeToggle = document.getElementById('themeToggle');
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, theme);
  }
  const savedTheme = localStorage.getItem(THEME_KEY) ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);
  themeToggle.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });

  // ---------- checklist progress ----------
  function checklistProgress(goalId) {
    const items = checklists[goalId] || [];
    if (items.length === 0) return { pct: 0, done: 0, total: 0 };
    const done = items.filter(i => i.done).length;
    return { pct: Math.round((done / items.length) * 100), done, total: items.length };
  }

  // ---------- dashboard ----------
  function renderDashboard() {
    const today = todayDate();
    const endD = toDate(END);
    const daysLeft = Math.max(0, Math.ceil((endD - today) / 86400000));
    document.getElementById('statDaysLeft').textContent = daysLeft;

    const progresses = CHECKLIST_GOALS.map(g => checklistProgress(g.id).pct);
    const overall = progresses.length ? Math.round(progresses.reduce((a, b) => a + b, 0) / progresses.length) : 0;
    document.getElementById('statOverall').textContent = overall + '%';

    const weekStart = mondayOf(today);
    const weekEnd = addDays(weekStart, 6);
    const gymDone = events.filter(e => {
      if (e.goalId !== 'gym' || !e.completed || !e.date) return false;
      const d = toDate(e.date);
      return d >= weekStart && d <= weekEnd;
    }).length;
    document.getElementById('statGymWeek').textContent = `${Math.min(gymDone, 5)}/5`;

    const cardsEl = document.getElementById('dashGoalCards');
    cardsEl.innerHTML = '';

    CHECKLIST_GOALS.forEach(g => {
      const { pct, done, total } = checklistProgress(g.id);
      cardsEl.appendChild(buildGoalCard(g, pct, `${done}/${total} items complete`));
    });

    const gymGoal = goalById('gym');
    const gymTotalDone = events.filter(e => e.goalId === 'gym' && e.completed).length;
    const gymTotalScheduled = events.filter(e => e.goalId === 'gym').length;
    const gymPct = gymTotalScheduled ? Math.round((gymTotalDone / gymTotalScheduled) * 100) : 0;
    cardsEl.appendChild(buildGoalCard(gymGoal, gymPct, `${gymTotalDone}/${gymTotalScheduled} sessions completed all summer`));
  }

  function buildGoalCard(goal, pct, subtitle) {
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.innerHTML = `
      <div class="goal-card-head">
        <div class="goal-title"><span class="dot" style="background:${goal.color}"></span>${goal.name}</div>
        <div class="progress-pct" style="color:${goal.color}">${pct}%</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${goal.color}"></div></div>
      <div class="goal-sub" style="margin-top:8px;">${subtitle}</div>
    `;
    return card;
  }

  // ---------- calendar ----------
  let addModalTargetDate = null;
  const addModal = document.getElementById('addModal');
  const addModalGoal = document.getElementById('addModalGoal');
  const addModalTitle = document.getElementById('addModalTitle');

  GOALS.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.name;
    addModalGoal.appendChild(opt);
  });

  function openAddModal(date) {
    addModalTargetDate = date;
    addModalTitle.value = '';
    addModal.classList.add('open');
    addModalTitle.focus();
  }
  document.getElementById('addModalCancel').addEventListener('click', () => addModal.classList.remove('open'));
  addModal.addEventListener('click', e => { if (e.target === addModal) addModal.classList.remove('open'); });
  document.getElementById('addModalConfirm').addEventListener('click', () => {
    const text = addModalTitle.value.trim();
    if (!text) return;
    events.push({ id: nextId++, date: addModalTargetDate, goalId: addModalGoal.value, title: text, completed: false });
    saveEvents();
    addModal.classList.remove('open');
    renderAll();
  });

  function renderLegend() {
    const legendEl = document.getElementById('calLegend');
    legendEl.innerHTML = GOALS.map(g =>
      `<span><span class="dot" style="background:${g.color}"></span>${g.name}</span>`
    ).join('');
  }

  function dropTargetAt(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    return el.closest('[data-drop-date]');
  }

  function beginPointerDrag(ev, chip, downEvent) {
    const startX = downEvent.clientX, startY = downEvent.clientY;
    let dragging = false;
    let ghost = null;

    function moveGhost(x, y) {
      ghost.style.left = (x - ghost.offsetWidth / 2) + 'px';
      ghost.style.top = (y - 16) + 'px';
    }

    function onMove(e) {
      if (!dragging) {
        if (Math.abs(e.clientX - startX) < 4 && Math.abs(e.clientY - startY) < 4) return;
        dragging = true;
        ghost = chip.cloneNode(true);
        ghost.classList.add('cal-chip-ghost');
        ghost.style.width = chip.offsetWidth + 'px';
        document.body.appendChild(ghost);
        chip.style.opacity = '0.35';
      }
      moveGhost(e.clientX, e.clientY);
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      const target = dropTargetAt(e.clientX, e.clientY);
      if (target) target.classList.add('drag-over');
    }

    function onUp(e) {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (!dragging) return;
      if (ghost) ghost.remove();
      const target = dropTargetAt(e.clientX, e.clientY);
      if (target) {
        const nd = target.dataset.dropDate;
        ev.date = nd === '' ? null : nd;
        saveEvents();
        renderAll();
      } else {
        chip.style.opacity = '';
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  function buildChip(ev) {
    const goal = goalById(ev.goalId);
    const chip = document.createElement('div');
    chip.className = 'cal-chip' + (ev.completed ? ' completed' : '');
    chip.style.setProperty('--chip-color', goal ? goal.color : '#999');
    chip.dataset.id = ev.id;

    const check = document.createElement('div');
    check.className = 'cal-chip-check';
    check.textContent = ev.completed ? '✓' : '';
    check.addEventListener('click', e => {
      e.stopPropagation();
      ev.completed = !ev.completed;
      saveEvents();
      renderAll();
    });

    const text = document.createElement('div');
    text.className = 'cal-chip-text';
    text.textContent = ev.title;

    const del = document.createElement('button');
    del.className = 'cal-chip-del';
    del.textContent = '✕';
    del.addEventListener('click', e => {
      e.stopPropagation();
      events = events.filter(x => x.id !== ev.id);
      saveEvents();
      renderAll();
    });

    chip.appendChild(check);
    chip.appendChild(text);
    chip.appendChild(del);

    chip.addEventListener('pointerdown', e => {
      if (check.contains(e.target) || del.contains(e.target)) return;
      if (e.button !== undefined && e.button !== 0) return;
      e.preventDefault();
      beginPointerDrag(ev, chip, e);
    });

    return chip;
  }

  function renderCalendar() {
    renderLegend();

    const startD = toDate(START), endD = toDate(END);
    const gridStart = mondayOf(startD);
    const lastMonday = mondayOf(endD);
    const gridEnd = addDays(lastMonday, 6);

    const weeksEl = document.getElementById('calWeeks');
    weeksEl.innerHTML = '';
    const today = todayDate();

    for (let wStart = new Date(gridStart); wStart <= gridEnd; wStart = addDays(wStart, 7)) {
      const weekRow = document.createElement('div');
      weekRow.className = 'cal-week';

      for (let i = 0; i < 7; i++) {
        const d = addDays(wStart, i);
        const ds = dateStr(d);
        const outside = d < startD || d > endD;
        const isAway = awayDays.includes(ds);
        const isToday = dateStr(d) === dateStr(today);

        const cell = document.createElement('div');
        cell.className = 'cal-day' + (outside ? ' outside' : '') + (isToday ? ' today' : '') + (isAway ? ' away' : '');

        const head = document.createElement('div');
        head.className = 'cal-day-head';
        const num = document.createElement('div');
        num.className = 'cal-day-num';
        num.textContent = d.getDate() + (d.getDate() === 1 || i === 0 ? ' ' + d.toLocaleString('default', { month: 'short' }) : '');
        head.appendChild(num);

        if (!outside) {
          const actions = document.createElement('div');
          actions.className = 'cal-day-actions';

          const addBtn = document.createElement('button');
          addBtn.className = 'cal-icon-btn';
          addBtn.textContent = '+';
          addBtn.title = 'Add task';
          addBtn.addEventListener('click', () => openAddModal(ds));

          const awayBtn = document.createElement('button');
          awayBtn.className = 'cal-icon-btn away-btn';
          awayBtn.textContent = '✈';
          awayBtn.title = isAway ? 'Marked away — click to unmark' : 'Mark as away (unschedules this day)';
          awayBtn.addEventListener('click', () => {
            if (isAway) {
              awayDays = awayDays.filter(x => x !== ds);
            } else {
              awayDays.push(ds);
              events.forEach(e => { if (e.date === ds) e.date = null; });
              saveEvents();
            }
            saveAway();
            renderAll();
          });

          actions.appendChild(addBtn);
          actions.appendChild(awayBtn);
          head.appendChild(actions);
        }

        cell.appendChild(head);

        const chipsWrap = document.createElement('div');
        chipsWrap.className = 'cal-chips';
        events.filter(e => e.date === ds).forEach(ev => chipsWrap.appendChild(buildChip(ev)));
        cell.appendChild(chipsWrap);

        if (!outside) cell.dataset.dropDate = ds;

        weekRow.appendChild(cell);
      }
      weeksEl.appendChild(weekRow);
    }

    // unscheduled tray
    const trayEl = document.getElementById('unscheduledTray');
    const trayList = document.getElementById('unscheduledList');
    trayList.innerHTML = '';
    trayList.dataset.dropDate = '';
    const unscheduled = events.filter(e => !e.date);
    trayEl.classList.toggle('has-items', unscheduled.length > 0);
    unscheduled.forEach(ev => trayList.appendChild(buildChip(ev)));
  }

  document.getElementById('regenBtn').addEventListener('click', () => {
    if (!confirm('Reset the calendar to the suggested schedule? This clears your custom edits, completions, and away days.')) return;
    events = generateSeedEvents();
    nextId = events.reduce((m, e) => Math.max(m, e.id), 0) + 1;
    awayDays = [];
    saveEvents();
    saveAway();
    renderAll();
  });

  // ---------- goals / checklists ----------
  function renderGoals() {
    const grid = document.getElementById('checklistGrid');
    grid.innerHTML = '';

    CHECKLIST_GOALS.forEach(g => {
      const card = document.createElement('div');
      card.className = 'checklist-card';

      const head = document.createElement('div');
      head.className = 'checklist-head';
      head.innerHTML = `<span class="dot" style="background:${g.color}"></span><h3>${g.name}</h3>`;
      card.appendChild(head);

      const itemsWrap = document.createElement('div');
      itemsWrap.className = 'checklist-items';
      (checklists[g.id] || []).forEach(item => {
        const row = document.createElement('div');
        row.className = 'checklist-item';

        const box = document.createElement('div');
        box.className = 'check-box' + (item.done ? ' done' : '');
        box.textContent = item.done ? '✓' : '';
        box.addEventListener('click', () => {
          item.done = !item.done;
          saveChecklists();
          renderAll();
        });

        const text = document.createElement('div');
        text.className = 'checklist-item-text' + (item.done ? ' done' : '');
        text.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '✕';
        del.addEventListener('click', () => {
          checklists[g.id] = checklists[g.id].filter(i => i.id !== item.id);
          saveChecklists();
          renderAll();
        });

        row.appendChild(box);
        row.appendChild(text);
        row.appendChild(del);
        itemsWrap.appendChild(row);
      });
      card.appendChild(itemsWrap);

      const addRow = document.createElement('div');
      addRow.className = 'checklist-add';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Add a sub-task…';
      input.maxLength = 80;
      const addBtn = document.createElement('button');
      addBtn.className = 'small-btn';
      addBtn.textContent = 'Add';
      function addItem() {
        const text = input.value.trim();
        if (!text) return;
        if (!checklists[g.id]) checklists[g.id] = [];
        checklists[g.id].push({ id: g.id + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), text, done: false });
        input.value = '';
        saveChecklists();
        renderAll();
      }
      addBtn.addEventListener('click', addItem);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
      addRow.appendChild(input);
      addRow.appendChild(addBtn);
      card.appendChild(addRow);

      grid.appendChild(card);
    });
  }

  // ---------- render all ----------
  function renderAll() {
    renderDashboard();
    renderCalendar();
    renderGoals();
  }

  renderAll();
})();
</script>
</body>
</html>
